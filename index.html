<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Ledger Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .card-3d {
            transform: perspective(1000px) rotateX(2deg) rotateY(-1deg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-3d:hover {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(-4px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen relative overflow-x-hidden font-sans">

    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/20 rounded-full filter blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[10%] right-[-10%] w-[600px] h-[600px] bg-purple-600/15 rounded-full filter blur-[150px] pointer-events-none"></div>

    <div class="max-w-4xl mx-auto py-12 px-4 relative z-10">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-cyan-400 to-purple-400 bg-clip-text text-transparent tracking-tight">
                Chronological Ledger Engine
            </h1>
            <p class="text-slate-400 mt-3 text-lg">AI-powered transactional auditing framework with spatial depth interface.</p>
        </div>

        <div class="glass-panel card-3d rounded-2xl p-8 mb-10">
            <form id="ledgerForm" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">System Schema Vertex</label>
                        <select id="fileType" class="w-full rounded-xl bg-slate-900/90 border border-slate-700 p-3 text-slate-200 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition">
                            <option value="medical">Medical Dossier Engine</option>
                            <option value="insurance">Insurance Subrogation Matrix</option>
                            <option value="legal">Legal Forensics Dossier</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Anomaly Audit Threshold ($)</label>
                        <input type="number" id="threshold" value="5000" class="w-full rounded-xl bg-slate-900/90 border border-slate-700 p-3 text-slate-200 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Unstructured Document Streams</label>
                    <div id="textInputsContainer" class="space-y-3">
                        <textarea class="document-text w-full rounded-xl bg-slate-900/90 border border-slate-700 p-4 text-slate-300 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none h-28 transition" placeholder="Inject unstructured transactional text lines here..."></textarea>
                    </div>
                    <button type="button" id="addTextBtn" class="mt-3 text-sm font-semibold text-cyan-400 hover:text-cyan-300 transition duration-200">+ Add Document Segment</button>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 via-cyan-500 to-purple-600 hover:opacity-95 text-white font-bold py-4 rounded-xl shadow-lg shadow-cyan-500/20 transition duration-300 transform active:scale-[0.99]">
                    Execute Reconciliation & Log Data
                </button>
            </form>
        </div>

        <div id="resultsContainer" class="hidden glass-panel rounded-2xl p-8 border border-slate-800">
            <h2 class="text-xl font-bold bg-gradient-to-r from-slate-100 to-slate-300 bg-clip-text text-transparent mb-8 flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-cyan-400 animate-pulse"></span> Reconciled Temporal Timeline
            </h2>
            
            <div id="timelineList" class="relative border-l-2 border-slate-800 ml-4 space-y-6">
                </div>
        </div>
    </div>

    <script>
        // Local testing link: "http://127.0.0.1:8000"
        const BACKEND_URL = "http://127.0.0.1:8000"; 

        document.getElementById('addTextBtn').addEventListener('click', () => {
            const container = document.getElementById('textInputsContainer');
            const textarea = document.createElement('textarea');
            textarea.className = "document-text w-full rounded-xl bg-slate-900/90 border border-slate-700 p-4 text-slate-300 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none h-28 mt-3 transition";
            textarea.placeholder = "Inject additional unstructured segment...";
            container.appendChild(textarea);
        });

        document.getElementById('ledgerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileType = document.getElementById('fileType').value;
            const threshold = parseFloat(document.getElementById('threshold').value);
            const textareas = document.querySelectorAll('.document-text');
            const unstructuredTexts = Array.from(textareas).map(t => t.value).filter(text => text.trim() !== "");

            const payload = {
                files_count: unstructuredTexts.length,
                file_type: fileType,
                target_threshold: threshold,
                unstructured_texts: unstructuredTexts
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/v1/ledger/process`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error('Data processing engine execution failure.');
                const data = await response.json();
                renderTimeline(data.timeline);
            } catch (error) {
                alert(error.message);
            }
        });

        function renderTimeline(events) {
            const container = document.getElementById('resultsContainer');
            const list = document.getElementById('timelineList');
            list.innerHTML = ''; 
            container.classList.remove('hidden');

            events.forEach(event => {
                const isFlagged = event.audit_flag;
                const glassCardStyle = isFlagged 
                    ? 'border-red-500/30 bg-gradient-to-br from-red-950/40 to-slate-900/90 shadow-red-950/20' 
                    : 'border-slate-800 bg-slate-900/60 shadow-black/40';
                
                const badge = isFlagged 
                    ? '<span class="text-xs px-2.5 py-1 rounded-md font-bold uppercase tracking-wider bg-red-500/10 text-red-400 border border-red-500/20">⚠️ Audit Flag</span>' 
                    : '<span class="text-xs px-2.5 py-1 rounded-md font-bold uppercase tracking-wider bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">✓ Verified</span>';

                const item = `
                    <div class="relative pl-8 group">
                        <span class="absolute -left-[7px] top-2 flex h-3 w-3 rounded-full bg-slate-800 group-hover:bg-cyan-400 ring-4 ring-slate-950 transition duration-300"></span>
                        <div class="border rounded-xl p-5 shadow-xl transition-all duration-300 hover:translate-x-1 ${glassCardStyle}">
                            <div class="flex items-center justify-between gap-4 mb-3">
                                <span class="text-sm font-bold tracking-wide text-cyan-400">${event.date}</span>
                                ${badge}
                            </div>
                            <p class="text-slate-200 text-sm font-medium mb-3">${event.description}</p>
                            <div class="text-xs text-slate-500 flex justify-between items-center pt-2 border-t border-slate-800/60">
                                <span>Context Structure: <span class="text-slate-400 italic">${event.date_type}</span></span>
                                <span class="text-base font-black text-slate-100">$${event.amount.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
                list.innerHTML += item;
            });
        }
    </script>
</body>
</html>
